# GitHub Dependabot configuration
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Tujuan:
# - Auto-detect dependency vulnerabilities & outdated packages
# - PR otomatis untuk security update + version bump
# - Minimal noise: grouped by ecosystem, weekly schedule

version: 2

updates:
  # -----------------------------------------------------------
  # npm packages
  # -----------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 10
    versioning-strategy: "increase"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

    # Group minor/patch bumps jadi 1 PR biar gak banjir
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

    # Major version: PR satu-satu (manual review wajib)
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    # Allow security updates ALWAYS (override ignore di atas)
    allow:
      - dependency-type: "all"

  # -----------------------------------------------------------
  # GitHub Actions
  # -----------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
      - "automated"
    commit-message:
      prefix: "ci"
      include: "scope"

  # -----------------------------------------------------------
  # Docker (kalau ada Dockerfile di root)
  # -----------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "docker"
      - "automated"
    commit-message:
      prefix: "build(docker)"
